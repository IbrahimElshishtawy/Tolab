components:
  securitySchemes:
    sanctum:
      type: "http"
      scheme: "bearer"
      description: "Laravel Sanctum Token authentication (Authorization: Bearer <token>)"
  responses:
    400BadRequest:
      description: "Bad Request or Validation Error"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              success:
                type: "boolean"
                example: false
              message:
                type: "string"
                example: "Validation failed."
              errors:
                type: "object"
                additionalProperties:
                  type: "array"
                  items:
                    type: "string"
    401Unauthenticated:
      description: "Unauthenticated request"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              success:
                type: "boolean"
                example: false
              message:
                type: "string"
                example: "Unauthenticated."
    403Forbidden:
      description: "Forbidden request (Insufficient permissions or unauthorized scope)"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              success:
                type: "boolean"
                example: false
              message:
                type: "string"
                example: "Forbidden."
    404NotFound:
      description: "Resource or Route not found"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              success:
                type: "boolean"
                example: false
              message:
                type: "string"
                example: "Resource not found."