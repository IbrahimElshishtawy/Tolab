name: tolab_fci
description: Premium university admin panel frontend.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  archive: ^3.6.1
  cached_network_image: ^3.4.1
  collection: ^1.19.1
  connectivity_plus: ^6.1.5
  cupertino_icons: ^1.0.8
  data_table_2: ^2.5.15
  desktop_drop: ^0.6.1
  dio: ^5.9.0
  file_picker: ^10.1.9
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.1
  fl_chart: ^1.0.0
  flutter_local_notifications: ^19.4.0
  flutter_redux: ^0.10.0
  flutter_secure_storage: ^9.2.4
  flutter_staggered_animations: ^1.1.1
  go_router: ^16.2.1
  google_fonts: ^6.3.1
  image_picker: ^1.2.0
  intl: ^0.20.2
  lottie: ^3.3.0
  pdfx: ^2.7.0
  pdf: ^3.11.3
  pretty_dio_logger: ^1.4.0
  redux: ^5.0.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  spreadsheet_decoder: ^2.3.0
  table_calendar: ^3.2.0
  url_launcher: ^6.3.2
  video_player: ^2.10.0
  web_socket_channel: ^3.0.3
  rename_app: ^1.6.5

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/
    - assets/lang/
    - assets/lang/en/
    - assets/lang/ar/
